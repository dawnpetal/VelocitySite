<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Install VelocityUI — one curl command. macOS 12+, Intel and Apple Silicon.">
  <title>Install — VelocityUI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/nav.css">
  <link rel="stylesheet" href="../css/sections.css">
</head>
<body>

<velocityui-page
  title="Install — VelocityUI"
  description="Install VelocityUI — one curl command. macOS 12+, Intel and Apple Silicon."
  nav-active="install"
  nav-scrolled>
  <template>
  <section class="page-hero">
    <div class="page-hero-grid" aria-hidden="true"></div>
    <div class="wrap page-hero-inner" data-reveal>
      <div class="eyebrow">Get Started</div>
      <h1 class="page-title">One command.<br><em>Running.</em></h1>
      <p class="page-sub">A single curl installs everything. No package manager, no brew tap, no drag-to-Applications. Paste and go.</p>
    </div>
  </section>

  <section class="install">
    <div class="install-plane" aria-hidden="true"></div>
    <div class="wrap install-inner">
      <div class="install-copy" data-reveal>
        <div class="eyebrow" style="margin-bottom:1.5rem">Setup</div>
        <h2 class="section-title" style="font-size:clamp(1.8rem,3.5vw,3rem)">Three steps<br>to scripting.</h2>
        <p class="install-desc">The installer handles everything -- downloads the binary, places it in <code style="font-family:var(--font-mono);font-size:0.85em;color:var(--ink)">/Applications</code>, and sets up your workspace folder.</p>
        <ol class="install-steps">
          <li class="install-step">
            <span class="step-n">01</span>
            <span class="step-t">Run the install command on the right</span>
          </li>
          <li class="install-step">
            <span class="step-n">02</span>
            <span class="step-t">Open VelocityUI, go to Settings, pick your executor (Hydrogen or Opiumware), then reload</span>
          </li>
          <li class="install-step">
            <span class="step-n">03</span>
            <span class="step-t">Write a script, press <kbd>Cmd+Return</kbd> to execute</span>
          </li>
        </ol>
      </div>

      <div class="term-cards" data-reveal data-d="2">
        <div class="terminal" id="installTerminal">
          <div class="term-bar">
            <div class="term-dots">
              <span class="term-dot term-dot--r"></span>
              <span class="term-dot term-dot--y"></span>
              <span class="term-dot term-dot--g"></span>
            </div>
            <span class="term-title">Install -- zsh</span>
            <div class="term-trail"></div>
          </div>
          <div class="term-body">
            <div class="term-cmd" id="termInstallCmd">
              <span class="term-prompt">$</span>
              <span class="term-text">curl -fsSL https://raw.githubusercontent.com/dawnpetal/VelocityUI/main/install.sh | bash</span>
            </div>
            <button class="copy-btn" id="copyInstallBtn" aria-label="Copy install command">
              <svg class="copy-icon copy-icon--idle" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              <svg class="copy-icon copy-icon--done" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
          </div>
          <div class="term-note">Requires macOS 12+ / curl / unzip / jq / Intel or Apple Silicon</div>
        </div>

        <div class="terminal terminal--uninstall" id="uninstallTerminal">
          <div class="term-bar">
            <div class="term-dots">
              <span class="term-dot term-dot--r"></span>
              <span class="term-dot term-dot--y"></span>
              <span class="term-dot term-dot--g"></span>
            </div>
            <span class="term-title">Uninstall -- zsh</span>
            <div class="term-trail"></div>
          </div>
          <div class="term-body">
            <div class="term-cmd" id="termUninstallCmd">
              <span class="term-prompt term-prompt--red">$</span>
              <span class="term-text">curl -fsSL https://raw.githubusercontent.com/dawnpetal/VelocityUI/main/uninstall.sh | bash</span>
            </div>
            <button class="copy-btn" id="copyUninstallBtn" aria-label="Copy uninstall command">
              <svg class="copy-icon copy-icon--idle" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              <svg class="copy-icon copy-icon--done" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
          </div>
          <div class="term-note term-note--warn">Removes the app, workspace folder, and all settings</div>
        </div>
      </div>
    </div>
  </section>
  </template>
</velocityui-page>

<script type="module" src="../js/main.js?v=landing-clean-21"></script>
</body>
</html>
